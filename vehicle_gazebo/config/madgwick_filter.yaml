imu_filter_madgwick:
  ros__parameters:
    # Frame IDs
    fixed_frame: odom
    world_frame: enu  # East-North-Up

    #Magnetómetro
    use_mag: true 
    use_magnetic_field_msg: true  # Esperar MagneticField msg
    
    # Parámetros del filtro
    gain: 0.01  # Ganancia Madgwick
    zeta: 0.001  # Drift compensation

    # Declinación magnética 
    mag_bias_x: 0.0
    mag_bias_y: 0.0  
    mag_bias_z: 0.0
    
    orientation_stddev: 0.05
    
    # Publicar TF
    publish_tf: false  # El EKF ya publica TF

    # Frecuencia de publicación
    constant_dt: 0.0  # 0 = usar timestamps de los mensajes
    
    # Debugging
    publish_debug_topics: false  # Ver topics de debug